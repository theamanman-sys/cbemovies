<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="purpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#910096"/>
      <stop offset="100%" style="stop-color:#6b1e68"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8a029"/>
      <stop offset="100%" style="stop-color:#b38d32"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="30" cy="30" r="28" fill="url(#purpGrad)"/>
  <!-- Gold diamond emblem -->
  <polygon points="30,10 42,30 30,50 18,30" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
  <polygon points="30,16 38,30 30,44 22,30" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>
  <circle cx="30" cy="30" r="6" fill="url(#goldGrad)"/>
  <!-- CBE text -->
  <text x="30" y="37" font-family="Arial Black, Arial, sans-serif" font-size="16" font-weight="900" fill="#fff" text-anchor="middle" dominant-baseline="middle">CBE</text>
  <!-- MOVIES text -->
  <text x="96" y="22" font-family="Arial, sans-serif" font-size="17" font-weight="800" fill="#910096" letter-spacing="2.5">MOVIES</text>
  <!-- Tagline -->
  <text x="96" y="40" font-family="Arial, sans-serif" font-size="9.5" fill="#a6a6a6" letter-spacing="1.2">BANK OF ETHIOPIA</text>
  <line x1="80" y1="28" x2="80" y2="34" stroke="#e8a029" stroke-width="1.5"/>
</svg>
